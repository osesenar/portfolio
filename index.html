<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oscar Senar — Photography</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@100;300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="name-wrap">
    <h1 class="name" id="nameHeading">OSCAR SENAR</h1>
  </header>

  <div class="view-stack">

    <section class="focus-view" id="focusView">
      <div class="mask" id="mask">
        <img class="stage-img" id="stageImg" src="" alt="">
        <div class="curtain curtain-a sides" id="curtainA"></div>
        <div class="curtain curtain-b sides" id="curtainB"></div>
        <div class="click-zones">
          <button class="zone zone-prev" id="zonePrev" aria-label="Previous photo"></button>
          <button class="zone zone-grid" id="zoneGrid" aria-label="View all photos"></button>
          <button class="zone zone-next" id="zoneNext" aria-label="Next photo"></button>
        </div>
      </div>
    </section>

    <section class="grid-view" id="gridView">
      <div class="grid-text">
        <p class="grid-email">osesenar@gmail.com</p>
        <p class="grid-bio">Drawn to symmetry, leading lines, and restrained compositions. Interested in architecture framing the experience of art.</p>
        <p class="grid-copyright">© 2026 <span class="grid-copyright-name">Oscar Senar</span></p>
      </div>
      <div class="grid" id="gridTrack"></div>
    </section>

  </div>

  <script src="script.js"></script>
</body>
</html>
